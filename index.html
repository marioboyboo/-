<!DOCTYPE html>
<html>
<head>
<title>Maximum Chaos Fart Machine</title>

<style>
body{
  background:black;
  color:white;
  font-family:Arial;
  text-align:center;
  overflow:hidden;
}

button{
  font-size:22px;
  padding:12px 25px;
  margin:10px;
  cursor:pointer;
}

.fartButton{
  position:absolute;
  font-size:18px;
  padding:8px 15px;
}

.shake{
  animation:shake 0.15s infinite;
}

@keyframes shake{
  0%{transform:translate(3px,2px)}
  25%{transform:translate(-3px,-2px)}
  50%{transform:translate(4px,-3px)}
  75%{transform:translate(-4px,3px)}
  100%{transform:translate(2px,-2px)}
}
</style>

</head>

<body>

<h1>💨 Maximum Chaos Fart Machine 💨</h1>

<button onclick="start()">Start Fart</button>
<button onclick="chaos()">MAXIMUM CHAOS MODE</button>

<audio id="fart" src="fart.mp3" loop></audio>

<script>

let fart = document.getElementById("fart")
let volume = 0.05
let chaosMode = false
let started = false

function start(){

  if(started) return
  started = true

  fart.volume = volume
  fart.play()

  document.body.classList.add("shake")

  setInterval(()=>{
    if(volume < 1){
      volume += 0.02
      fart.volume = volume
    }
  },1000)

  spawnButtons()
}

function spawnButtons(){

  setInterval(()=>{

    let btn = document.createElement("button")
    btn.innerText = "💨"
    btn.className = "fartButton"

    btn.style.left = Math.random()*window.innerWidth + "px"
    btn.style.top = Math.random()*window.innerHeight + "px"

    btn.onclick = ()=>{
      fart.currentTime = 0
      fart.play()
    }

    document.body.appendChild(btn)

    if(!chaosMode && document.querySelectorAll(".fartButton").length > 20){
      btn.remove()
    }

  },700)

}

function chaos(){

  chaosMode = true

  setInterval(()=>{
    document.body.style.background =
      "hsl(" + Math.random()*360 + ",100%,50%)"
  },150)

  setInterval(()=>{
    for(let i=0;i<5;i++){

      let btn = document.createElement("button")
      btn.innerText="💨"
      btn.className="fartButton"

      btn.style.left=Math.random()*window.innerWidth+"px"
      btn.style.top=Math.random()*window.innerHeight+"px"

      btn.onclick=()=>{
        fart.currentTime=0
        fart.play()
      }

      document.body.appendChild(btn)
    }
  },200)

}

</script>

</body>
</html>
