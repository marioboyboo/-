<!DOCTYPE html>
<html>
<head>
<title>Maximum Chaos Fart Machine</title>

<style>

body{
background:black;
color:white;
font-family:Arial;
text-align:center;
overflow:hidden;
}

#world{
transition:transform 0.05s linear;
}

button{
font-size:22px;
padding:12px 25px;
margin:10px;
cursor:pointer;
}

.fartButton{
position:absolute;
font-size:20px;
padding:8px 15px;
}

.dvd{
position:absolute;
font-size:40px;
}

.popup{
position:absolute;
background:white;
color:black;
border:3px solid black;
width:250px;
padding:10px;
font-family:Tahoma;
}

.title{
background:#000080;
color:white;
padding:4px;
}

.shake{
animation:shake 0.12s infinite;
}

@keyframes shake{
0%{transform:translate(3px,2px)}
25%{transform:translate(-3px,-2px)}
50%{transform:translate(4px,-3px)}
75%{transform:translate(-4px,3px)}
100%{transform:translate(2px,-2px)}
}

</style>
</head>

<body>

<div id="world">

<h1>💨 Maximum Chaos Fart Machine 💨</h1>

<button onclick="start()">Start</button>
<button onclick="chaos()">MAXIMUM CHAOS</button>

</div>

<script>

let fart
let volume = 0.05
let chaosMode = false
let spin = 0
let spinSpeed = 1

const world = document.getElementById("world")

function start(){

fart = new Audio("fart.mp3")
fart.loop = true
fart.volume = volume
fart.play()

world.classList.add("shake")

setInterval(()=>{
if(volume < 1){
volume += chaosMode ? 0.05 : 0.02
fart.volume = volume
}
},1000)

spawnButtons()

}

function spawnButtons(){

setInterval(()=>{

let btn=document.createElement("button")
btn.innerText="💨"
btn.className="fartButton"

btn.style.left=Math.random()*window.innerWidth+"px"
btn.style.top=Math.random()*window.innerHeight+"px"

btn.onclick=()=>{
let s=new Audio("fart.mp3")
s.volume=volume
s.play()
}

document.body.appendChild(btn)

if(!chaosMode && document.querySelectorAll(".fartButton").length>20){
btn.remove()
}

},chaosMode ? 200 : 700)

}

function chaos(){

chaosMode=true

dvdFarts()
windowsErrors()
spinPage()
extraFarts()

}

function spinPage(){

setInterval(()=>{

spin += spinSpeed
spinSpeed += 0.05

world.style.transform = "rotate("+spin+"deg)"

},30)

}

function dvdFarts(){

for(let i=0;i<10;i++){

let f=document.createElement("div")
f.innerText="💨"
f.className="dvd"

let x=Math.random()*window.innerWidth
let y=Math.random()*window.innerHeight
let vx=5+Math.random()*5
let vy=5+Math.random()*5

document.body.appendChild(f)

setInterval(()=>{

x+=vx
y+=vy

if(x<0||x>window.innerWidth-40)vx*=-1
if(y<0||y>window.innerHeight-40)vy*=-1

f.style.left=x+"px"
f.style.top=y+"px"

},16)

}

}

function windowsErrors(){

setInterval(()=>{

let p=document.createElement("div")
p.className="popup"

p.style.left=Math.random()*(window.innerWidth-250)+"px"
p.style.top=Math.random()*(window.innerHeight-120)+"px"

p.innerHTML=`
<div class="title">Windows</div>
Too many farts detected.
<br><br>
<button onclick="this.parentElement.remove()">OK</button>
`

document.body.appendChild(p)

},800)

}

function extraFarts(){

setInterval(()=>{

for(let i=0;i<5;i++){

let s=new Audio("fart.mp3")
s.volume=volume
s.play()

}

},600)

}

</script>

</body>
</html>
