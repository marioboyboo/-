<!DOCTYPE html>
<html>
<head>
<title>Maximum Chaos Fart Machine</title>

<style>

body{
background:black;
color:white;
font-family:Arial;
text-align:center;
overflow:hidden;
transition:transform 0.2s linear;
}

button{
font-size:22px;
padding:12px 25px;
margin:10px;
cursor:pointer;
}

.fartButton{
position:absolute;
font-size:20px;
padding:8px 15px;
}

.dvdFart{
position:absolute;
font-size:40px;
pointer-events:none;
}

.shake{
animation:shake 0.15s infinite;
}

.popup{
position:absolute;
background:white;
color:black;
border:3px solid black;
width:260px;
padding:10px;
box-shadow:5px 5px 10px black;
font-family:Tahoma;
}

.popupTitle{
background:#000080;
color:white;
padding:5px;
font-weight:bold;
}

@keyframes shake{
0%{transform:translate(3px,2px)}
25%{transform:translate(-3px,-2px)}
50%{transform:translate(4px,-3px)}
75%{transform:translate(-4px,3px)}
100%{transform:translate(2px,-2px)}
}

</style>
</head>

<body>

<h1>💨 Maximum Chaos Fart Machine 💨</h1>

<button onclick="start()">Start Fart</button>
<button onclick="chaos()">MAXIMUM CHAOS MODE</button>

<audio id="fart">
<source src="fart.mp3" type="audio/mpeg">
</audio>

<script>

let fart = document.getElementById("fart")
let volume = 0.05
let chaosMode = false
let spin = 0
let started=false

function start(){

if(started) return
started=true

fart.loop=true
fart.volume=volume

// Force audio load
fart.load()

// Play after user interaction
fart.play().catch(()=>{})

document.body.classList.add("shake")

setInterval(()=>{
if(volume<1){
volume+=0.02
fart.volume=volume
}
},1000)

spawnButtons()

}

function spawnButtons(){

setInterval(()=>{

let btn=document.createElement("button")
btn.innerText="💨"
btn.className="fartButton"

btn.style.left=Math.random()*window.innerWidth+"px"
btn.style.top=Math.random()*window.innerHeight+"px"

btn.onclick=()=>{
fart.currentTime=0
fart.play().catch(()=>{})
}

document.body.appendChild(btn)

if(!chaosMode && document.querySelectorAll(".fartButton").length>20){
btn.remove()
}

},700)

}

function chaos(){

chaosMode=true

spawnDVDfarts()
spawnPopups()
spinPage()

}

function spawnDVDfarts(){

for(let i=0;i<5;i++){

let fartEmoji=document.createElement("div")
fartEmoji.innerText="💨"
fartEmoji.className="dvdFart"

let x=Math.random()*window.innerWidth
let y=Math.random()*window.innerHeight
let vx=4+Math.random()*3
let vy=4+Math.random()*3

document.body.appendChild(fartEmoji)

setInterval(()=>{

x+=vx
y+=vy

if(x<0 || x>window.innerWidth-40) vx*=-1
if(y<0 || y>window.innerHeight-40) vy*=-1

fartEmoji.style.left=x+"px"
fartEmoji.style.top=y+"px"

},20)

}

}

function spawnPopups(){

setInterval(()=>{

let popup=document.createElement("div")
popup.className="popup"

popup.style.left=Math.random()*(window.innerWidth-260)+"px"
popup.style.top=Math.random()*(window.innerHeight-120)+"px"

popup.innerHTML=`
<div class="popupTitle">Windows</div>
<p>System Error:<br>Too many farts detected.</p>
<button onclick="this.parentElement.remove()">OK</button>
`

document.body.appendChild(popup)

},2000)

}

function spinPage(){

setInterval(()=>{

spin+=2
document.body.style.transform="rotate("+spin+"deg)"

},50)

}

</script>

</body>
</html>
